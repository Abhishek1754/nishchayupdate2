<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUDDO - Address</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#000;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .mobile-screen{
            width:390px;
            min-height:100vh;
            background:#000;
            border:2px solid #b6ff00;
            border-radius:25px;
            padding:20px;
            position:relative;
            overflow:hidden;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;
        }

        .back-btn{
            color:#b6ff00;
            font-size:24px;
            text-decoration:none;
        }

        .title{
            font-size:24px;
            font-weight:bold;
            color:#fff;
        }

        .add-address{
            color:#b6ff00;
            font-size:14px;
            text-decoration:none;
        }

        .address-card{
            background:#111;
            border:1px solid #222;
            border-radius:18px;
            padding:18px;
            margin-bottom:18px;
            transition:0.3s;
        }

        .address-card:hover{
            border-color:#b6ff00;
            box-shadow:0 0 15px #b6ff00;
        }

        .address-top{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:10px;
        }

        .address-type{
            font-size:20px;
            color:#b6ff00;
            font-weight:bold;
        }

        .radio{
            width:20px;
            height:20px;
            border-radius:50%;
            border:2px solid #b6ff00;
            background:#b6ff00;
            box-shadow:0 0 10px #b6ff00;
        }

        .address-text{
            color:#ccc;
            line-height:1.6;
            font-size:15px;
        }

        .phone{
            margin-top:8px;
            color:#999;
            font-size:14px;
        }

        .deliver-btn{
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            background:#b6ff00;
            color:#000;
            font-size:18px;
            font-weight:bold;
            margin-top:25px;
            cursor:pointer;
            transition:0.3s;
        }

        .deliver-btn:hover{
            box-shadow:0 0 20px #b6ff00;
            transform:scale(1.02);
        }

    </style>
</head>

<body>

<div class="mobile-screen">

    <div class="top-bar">
        <a href="/food/cart/" class="back-btn">←</a>
        <div class="title">Select Address</div>
        <a href="#" class="add-address">+ Add New</a>
    </div>

    <div class="address-card">
        <div class="address-top">
            <div class="address-type">🏠 Home</div>
            <div class="radio"></div>
        </div>

        <div class="address-text">
            123 Green Park,<br>
            New Delhi - 110016
        </div>

        <div class="phone">
            Rohit (You)<br>
            9876543210
        </div>
    </div>

    <div class="address-card">
        <div class="address-top">
            <div class="address-type">🏢 Work</div>
        </div>

        <div class="address-text">
            Cyber City Phase 2,<br>
            Gurgaon - 122001
        </div>

        <div class="phone">
            Rohit (Office)<br>
            9876543210
        </div>
    </div>

    <div class="address-card">
        <div class="address-top">
            <div class="address-type">📍 Other</div>
        </div>

        <div class="address-text">
            MG Road,<br>
            Bangalore - 560034
        </div>

        <div class="phone">
            Rohit<br>
            9876543210
        </div>
    </div>

    <a href="/food/payment/">
        <button class="deliver-btn">
            Deliver Here
        </button>
    </a>

</div>

</body>
</html>
</html>
