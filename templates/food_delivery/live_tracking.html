<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUDDO - Live Tracking</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#000;
            color:white;
            display:flex;
            justify-content:center;
            min-height:100vh;
            overflow-x:hidden;
        }

        .mobile-screen{
            width:100%;
            max-width:390px;
            min-height:100vh;
            background:#000;
            padding:18px;
            position:relative;
            overflow:hidden;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .back-btn{
            width:42px;
            height:42px;
            border-radius:50%;
            border:2px solid #c6ff00;
            display:flex;
            justify-content:center;
            align-items:center;
            color:#c6ff00;
            text-decoration:none;
            font-size:20px;
            box-shadow:0 0 12px rgba(198,255,0,.3);
        }

        .page-title{
            font-size:20px;
            font-weight:700;
            color:#fff;
        }

        .support-btn{
            color:#c6ff00;
            font-size:14px;
            text-decoration:none;
        }

        .status-card{
            background:#0b0b0b;
            border:1px solid #1f1f1f;
            border-radius:20px;
            padding:20px;
            margin-bottom:20px;
            text-align:center;
            box-shadow:0 0 15px rgba(198,255,0,.08);
        }

        .status-icon{
            width:80px;
            height:80px;
            border-radius:50%;
            border:3px solid #c6ff00;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:auto;
            margin-bottom:15px;
            font-size:38px;
            color:#c6ff00;
            box-shadow:0 0 20px rgba(198,255,0,.3);
        }

        .status-card h2{
            font-size:24px;
            margin-bottom:8px;
        }

        .status-card p{
            color:#bbb;
            font-size:14px;
            line-height:1.6;
        }

        .map{
            width:100%;
            height:300px;
            background:#111;
            border-radius:24px;
            margin-bottom:20px;
            overflow:hidden;
            position:relative;
            border:1px solid #1f1f1f;
        }

        .map::before{
            content:'';
            position:absolute;
            inset:0;
            background:
            linear-gradient(rgba(198,255,0,.08) 1px, transparent 1px),
            linear-gradient(90deg, rgba(198,255,0,.08) 1px, transparent 1px);
            background-size:35px 35px;
        }

        .map-marker{
            position:absolute;
            top:40%;
            left:50%;
            transform:translate(-50%,-50%);
            width:70px;
            height:70px;
            border-radius:50%;
            background:#c6ff00;
            display:flex;
            justify-content:center;
            align-items:center;
            color:#000;
            font-size:30px;
            box-shadow:0 0 30px rgba(198,255,0,.6);
            z-index:2;
        }

        .route-line{
            position:absolute;
            width:6px;
            height:120px;
            background:#c6ff00;
            top:52%;
            left:50%;
            transform:translateX(-50%);
            border-radius:20px;
            box-shadow:0 0 15px rgba(198,255,0,.5);
        }

        .delivery-info{
            background:#0b0b0b;
            border:1px solid #1f1f1f;
            border-radius:20px;
            padding:18px;
            margin-bottom:20px;
        }

        .delivery-top{
            display:flex;
            align-items:center;
            gap:14px;
            margin-bottom:15px;
        }

        .delivery-boy{
            width:58px;
            height:58px;
            border-radius:50%;
            background:#161616;
            border:2px solid #c6ff00;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:24px;
            color:#c6ff00;
        }

        .delivery-details h3{
            font-size:18px;
            margin-bottom:5px;
        }

        .delivery-details p{
            color:#bbb;
            font-size:13px;
        }

        .call-btn{
            width:100%;
            height:52px;
            border:none;
            border-radius:14px;
            background:#c6ff00;
            color:#000;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
            transition:.3s;
        }

        .call-btn:hover{
            box-shadow:0 0 18px rgba(198,255,0,.4);
            transform:scale(1.02);
        }

        .timeline{
            margin-top:10px;
        }

        .step{
            display:flex;
            align-items:flex-start;
            gap:14px;
            margin-bottom:20px;
        }

        .step-dot{
            width:16px;
            height:16px;
            border-radius:50%;
            background:#c6ff00;
            margin-top:5px;
            box-shadow:0 0 10px rgba(198,255,0,.5);
        }

        .step-content h4{
            font-size:15px;
            margin-bottom:4px;
        }

        .step-content p{
            color:#aaa;
            font-size:12px;
        }

        .bottom-glow{
            position:absolute;
            width:240px;
            height:240px;
            background:#c6ff00;
            filter:blur(150px);
            opacity:.08;
            bottom:-100px;
            left:50%;
            transform:translateX(-50%);
            pointer-events:none;
        }

        @media(max-width:480px){

            .mobile-screen{
                max-width:100%;
            }

        }

    </style>

</head>

<body>

<div class="mobile-screen">

    <div class="top-bar">

        <a href="/food/order-tracking/" class="back-btn">
            ←
        </a>

        <div class="page-title">
            Live Tracking
        </div>

        <a href="/food/support/" class="support-btn">
            Help
        </a>

    </div>

    <div class="status-card">

        <div class="status-icon">
            🛵
        </div>

        <h2>Delivery On The Way</h2>

        <p>
            Your order is arriving in
            approximately 12 minutes.
        </p>

    </div>

    <div class="map">

        <div class="map-marker">
            🛵
        </div>

        <div class="route-line"></div>

    </div>

    <div class="delivery-info">

        <div class="delivery-top">

            <div class="delivery-boy">
                👨
            </div>

            <div class="delivery-details">

                <h3>Rahul Kumar</h3>

                <p>Delivery Partner • 4.9 ★</p>

            </div>

        </div>

        <button class="call-btn">
            Call Delivery Partner
        </button>

    </div>

    <div class="timeline">

        <div class="step">

            <div class="step-dot"></div>

            <div class="step-content">

                <h4>Order Confirmed</h4>

                <p>Your restaurant accepted the order</p>

            </div>

        </div>

        <div class="step">

            <div class="step-dot"></div>

            <div class="step-content">

                <h4>Food Prepared</h4>

                <p>Your order is packed and ready</p>

            </div>

        </div>

        <div class="step">

            <div class="step-dot"></div>

            <div class="step-content">

                <h4>Out For Delivery</h4>

                <p>Delivery partner is heading to you</p>

            </div>

        </div>

    </div>

    <div class="bottom-glow"></div>

</div>

</body>
</html>
