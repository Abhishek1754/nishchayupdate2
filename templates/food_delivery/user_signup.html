<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Signup - FUDDO</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#000;
            font-family:'Poppins',sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
        }

        .mobile-screen{
            width:100%;
            max-width:430px;
            min-height:100vh;
            background:#000;
            color:white;
            padding:25px;
            position:relative;
        }

        .back-btn{
            width:55px;
            height:55px;
            border-radius:50%;
            border:2px solid #c6ff00;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:24px;
            color:#c6ff00;
            text-decoration:none;
            margin-bottom:30px;
            box-shadow:0 0 15px rgba(198,255,0,.4);
        }

        .logo-box{
            width:110px;
            height:110px;
            border:3px solid #c6ff00;
            border-radius:28px;
            margin:auto;
            display:flex;
            justify-content:center;
            align-items:center;
            color:#c6ff00;
            font-size:75px;
            font-weight:800;
            box-shadow:0 0 25px #c6ff00;
        }

        .brand{
            text-align:center;
            margin-top:18px;
        }

        .brand h1{
            font-size:58px;
            color:#c6ff00;
            font-weight:800;
        }

        .brand p{
            color:#bbb;
            margin-top:6px;
            font-size:18px;
        }

        .heading{
            margin-top:35px;
            text-align:center;
        }

        .heading h2{
            font-size:34px;
            margin-bottom:10px;
        }

        .heading p{
            color:#bbb;
            line-height:1.7;
            font-size:15px;
        }

        .form{
            margin-top:35px;
        }

        .input-box{
            margin-bottom:18px;
        }

        .input-box label{
            display:block;
            margin-bottom:10px;
            color:#c6ff00;
            font-size:15px;
        }

        .input-box input{
            width:100%;
            height:62px;
            border-radius:18px;
            border:2px solid #1f1f1f;
            background:#0a0a0a;
            padding:0 18px;
            color:white;
            font-size:16px;
            outline:none;
            transition:.3s;
        }

        .input-box input:focus{
            border-color:#c6ff00;
            box-shadow:0 0 12px rgba(198,255,0,.2);
        }

        .signup-btn{
            width:100%;
            height:68px;
            background:#c6ff00;
            border:none;
            border-radius:18px;
            color:#000;
            font-size:24px;
            font-weight:700;
            margin-top:12px;
            cursor:pointer;
            transition:.3s;
        }

        .signup-btn:hover{
            transform:scale(1.02);
            box-shadow:0 0 25px #c6ff00;
        }

        .divider{
            margin:30px 0;
            text-align:center;
            position:relative;
            color:#bbb;
        }

        .divider::before{
            content:'';
            position:absolute;
            left:0;
            top:50%;
            width:35%;
            height:1px;
            background:#333;
        }

        .divider::after{
            content:'';
            position:absolute;
            right:0;
            top:50%;
            width:35%;
            height:1px;
            background:#333;
        }

        .social-login{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:16px;
        }

        .social-btn{
            height:62px;
            border-radius:18px;
            border:2px solid #1f1f1f;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:10px;
            font-size:17px;
            cursor:pointer;
            transition:.3s;
        }

        .social-btn:hover{
            border-color:#c6ff00;
            color:#c6ff00;
        }

        .login-link{
            margin-top:32px;
            text-align:center;
            color:#bbb;
            font-size:16px;
        }

        .login-link a{
            color:#c6ff00;
            text-decoration:none;
            font-weight:600;
        }

        .bottom-glow{
            position:absolute;
            width:250px;
            height:250px;
            background:#c6ff00;
            filter:blur(150px);
            opacity:.08;
            bottom:-100px;
            left:50%;
            transform:translateX(-50%);
        }

    </style>

</head>

<body>

<div class="mobile-screen">

    <a href="/food/user-login/" class="back-btn">
        ←
    </a>

    <div class="logo-box">
        F
    </div>

    <div class="brand">

        <h1>FUDDO</h1>

        <p>Create your account</p>

    </div>

    <div class="heading">

        <h2>User Signup</h2>

        <p>
            Join FUDDO and start ordering,
            shopping & earning cashback rewards.
        </p>

    </div>

    <div class="form">

        <div class="input-box">

            <label>Full Name</label>

            <input type="text" placeholder="Enter full name">

        </div>

        <div class="input-box">

            <label>Email Address</label>

            <input type="email" placeholder="Enter email">

        </div>

        <div class="input-box">

            <label>Phone Number</label>

            <input type="text" placeholder="Enter phone number">

        </div>

        <div class="input-box">

            <label>Password</label>

            <input type="password" placeholder="Create password">

        </div>

        <div class="input-box">

            <label>Confirm Password</label>

            <input type="password" placeholder="Confirm password">

        </div>

        <button class="signup-btn">
            Create Account →
        </button>

    </div>

    <div class="divider">
        or continue with
    </div>

    <div class="social-login">

        <div class="social-btn">
            🔴 Google
        </div>

        <div class="social-btn">
            ⚫ Apple
        </div>

    </div>

    <div class="login-link">

        Already have an account?

        <a href="/food/user-login/">
            Login
        </a>

    </div>

    <div class="bottom-glow"></div>

</div>

</body>
</html>
