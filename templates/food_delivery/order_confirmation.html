<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUDDO - Order Confirmed</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#000;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            overflow-x:hidden;
        }

        .mobile-screen{
            width:100%;
            max-width:390px;
            min-height:100vh;
            background:#000;
            padding:20px;
            position:relative;
            overflow:hidden;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
        }

        .glow{
            position:absolute;
            width:260px;
            height:260px;
            background:#c6ff00;
            filter:blur(160px);
            opacity:.08;
            top:-80px;
            border-radius:50%;
        }

        .success-circle{
            width:140px;
            height:140px;
            border-radius:50%;
            border:4px solid #c6ff00;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:70px;
            color:#c6ff00;
            margin-bottom:30px;
            box-shadow:0 0 30px rgba(198,255,0,.4);
            position:relative;
            z-index:2;
            animation:pop 1s ease;
        }

        @keyframes pop{
            0%{
                transform:scale(0.5);
                opacity:0;
            }
            100%{
                transform:scale(1);
                opacity:1;
            }
        }

        h1{
            font-size:34px;
            color:#c6ff00;
            margin-bottom:14px;
            position:relative;
            z-index:2;
        }

        .sub-text{
            color:#bbb;
            font-size:15px;
            line-height:1.7;
            margin-bottom:30px;
            position:relative;
            z-index:2;
        }

        .order-card{
            width:100%;
            background:#0b0b0b;
            border:1px solid #1f1f1f;
            border-radius:22px;
            padding:22px;
            margin-bottom:28px;
            position:relative;
            z-index:2;
            box-shadow:0 0 15px rgba(198,255,0,.08);
        }

        .order-card h3{
            color:#c6ff00;
            font-size:22px;
            margin-bottom:18px;
        }

        .detail-row{
            display:flex;
            justify-content:space-between;
            margin-bottom:14px;
            font-size:14px;
        }

        .detail-title{
            color:#999;
        }

        .detail-value{
            color:#fff;
            font-weight:600;
        }

        .estimated{
            width:100%;
            background:#111;
            border:1px solid #1f1f1f;
            border-radius:18px;
            padding:18px;
            margin-bottom:28px;
            position:relative;
            z-index:2;
        }

        .estimated h2{
            color:#c6ff00;
            font-size:26px;
            margin-bottom:8px;
        }

        .estimated p{
            color:#bbb;
            font-size:13px;
        }

        .track-btn{
            width:100%;
            height:58px;
            border:none;
            border-radius:18px;
            background:#c6ff00;
            color:#000;
            font-size:18px;
            font-weight:700;
            cursor:pointer;
            transition:.3s;
            position:relative;
            z-index:2;
        }

        .track-btn:hover{
            transform:scale(1.02);
            box-shadow:0 0 20px rgba(198,255,0,.4);
        }

        .reward-box{
            margin-top:22px;
            color:#c6ff00;
            font-size:14px;
            font-weight:600;
            position:relative;
            z-index:2;
        }

        @media(max-width:480px){

            .mobile-screen{
                max-width:100%;
            }

            h1{
                font-size:30px;
            }

            .success-circle{
                width:120px;
                height:120px;
                font-size:60px;
            }

        }

    </style>

</head>

<body>

<div class="mobile-screen">

    <div class="glow"></div>

    <div class="success-circle">
        ✓
    </div>

    <h1>Order Confirmed</h1>

    <p class="sub-text">
        Your delicious food is being prepared.
        Sit back and relax while we deliver it fast 🚀
    </p>

    <div class="order-card">

        <h3>Order Details</h3>

        <div class="detail-row">

            <div class="detail-title">
                Order ID
            </div>

            <div class="detail-value">
                #FUDDO45821
            </div>

        </div>

        <div class="detail-row">

            <div class="detail-title">
                Restaurant
            </div>

            <div class="detail-value">
                Pizza Point
            </div>

        </div>

        <div class="detail-row">

            <div class="detail-title">
                Payment
            </div>

            <div class="detail-value">
                Paid Online
            </div>

        </div>

        <div class="detail-row">

            <div class="detail-title">
                Total Amount
            </div>

            <div class="detail-value">
                ₹483
            </div>

        </div>

    </div>

    <div class="estimated">

        <h2>25 mins</h2>

        <p>
            Estimated delivery time
        </p>

    </div>

    <a href="/food/order-tracking/" style="width:100%; text-decoration:none;">

        <button class="track-btn">
            Track Your Order →
        </button>

    </a>

    <div class="reward-box">
        🎁 ₹50 Cashback Added To Wallet
    </div>

</div>

</body>
</html>
