<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUDDO - Delivered</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#000;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .mobile-screen{
            width:390px;
            min-height:100vh;
            background:#000;
            border:2px solid #b6ff00;
            border-radius:25px;
            padding:30px 20px;
            text-align:center;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            position:relative;
            overflow:hidden;
        }

        .glow{
            position:absolute;
            width:250px;
            height:250px;
            background:#b6ff00;
            filter:blur(140px);
            opacity:0.12;
            border-radius:50%;
            top:-50px;
        }

        .success-icon{
            width:140px;
            height:140px;
            border-radius:50%;
            border:4px solid #b6ff00;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:70px;
            color:#b6ff00;
            box-shadow:0 0 35px #b6ff00;
            margin-bottom:35px;
            position:relative;
            z-index:2;
        }

        h1{
            font-size:42px;
            color:#b6ff00;
            margin-bottom:18px;
            position:relative;
            z-index:2;
        }

        p{
            color:#ccc;
            font-size:18px;
            line-height:1.7;
            margin-bottom:35px;
            position:relative;
            z-index:2;
        }

        .order-box{
            width:100%;
            background:#111;
            border:1px solid #222;
            border-radius:20px;
            padding:20px;
            margin-bottom:35px;
            position:relative;
            z-index:2;
        }

        .order-box h3{
            color:#b6ff00;
            margin-bottom:12px;
            font-size:22px;
        }

        .order-box p{
            margin:6px 0;
            font-size:15px;
            color:#bbb;
        }

        .home-btn{
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            background:#b6ff00;
            color:#000;
            font-size:20px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
            position:relative;
            z-index:2;
        }

        .home-btn:hover{
            transform:scale(1.03);
            box-shadow:0 0 25px #b6ff00;
        }

        .reward-text{
            margin-top:20px;
            color:#b6ff00;
            font-size:16px;
            font-weight:bold;
            position:relative;
            z-index:2;
        }

    </style>

</head>

<body>

<div class="mobile-screen">

    <div class="glow"></div>

    <div class="success-icon">
        ✓
    </div>

    <h1>Delivered</h1>

    <p>
        Your order has been successfully delivered.
        Hope you enjoy your meal 🎉
    </p>

    <div class="order-box">

        <h3>Order Details</h3>

        <p>Order ID : #FUDDO45821</p>

        <p>Delivered in : 24 mins</p>

        <p>Payment : Paid Online</p>

    </div>

    <a href="/food/home/" style="width:100%; text-decoration:none;">

        <button class="home-btn">
            Back To Home
        </button>

    </a>

    <div class="reward-text">
        + ₹50 Cashback Added To Wallet
    </div>

</div>

</body>
</html>
