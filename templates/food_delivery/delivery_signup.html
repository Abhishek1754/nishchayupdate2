<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Partner Signup - FUDDO</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#000;
            font-family:'Poppins',sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow-x:hidden;
        }

        .mobile-screen{
            width:100%;
            max-width:390px;
            min-height:100vh;
            background:#000;
            color:white;
            padding:18px;
            position:relative;
            overflow:hidden;
        }

        .back-btn{
            width:45px;
            height:45px;
            border-radius:50%;
            border:2px solid #c6ff00;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:20px;
            color:#c6ff00;
            text-decoration:none;
            margin-bottom:25px;
            box-shadow:0 0 10px rgba(198,255,0,.4);
        }

        .bike-box{
            width:90px;
            height:90px;
            border:3px solid #c6ff00;
            border-radius:25px;
            margin:auto;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:50px;
            color:#c6ff00;
            box-shadow:0 0 20px #c6ff00;
        }

        .brand{
            text-align:center;
            margin-top:18px;
        }

        .brand h1{
            color:#c6ff00;
            font-size:42px;
            font-weight:800;
        }

        .brand p{
            color:#bbb;
            margin-top:6px;
            font-size:15px;
        }

        .heading{
            text-align:center;
            margin-top:28px;
        }

        .heading h2{
            font-size:26px;
            margin-bottom:8px;
        }

        .heading p{
            color:#bbb;
            line-height:1.6;
            font-size:14px;
        }

        .form{
            margin-top:28px;
        }

        .input-box{
            margin-bottom:16px;
        }

        .input-box label{
            display:block;
            margin-bottom:8px;
            color:#c6ff00;
            font-size:14px;
        }

        .input-box input{
            width:100%;
            height:52px;
            border-radius:14px;
            border:2px solid #1f1f1f;
            background:#0b0b0b;
            padding:0 16px;
            color:white;
            font-size:15px;
            outline:none;
            transition:.3s;
        }

        .input-box input:focus{
            border-color:#c6ff00;
            box-shadow:0 0 12px rgba(198,255,0,.2);
        }

        .signup-btn{
            width:100%;
            height:56px;
            border:none;
            border-radius:14px;
            background:#c6ff00;
            color:#000;
            font-size:18px;
            font-weight:700;
            cursor:pointer;
            margin-top:8px;
            transition:.3s;
        }

        .signup-btn:hover{
            transform:scale(1.02);
            box-shadow:0 0 20px #c6ff00;
        }

        .benefits{
            margin-top:25px;
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:10px;
        }

        .benefit-card{
            background:#0b0b0b;
            border:1px solid #1f1f1f;
            border-radius:14px;
            padding:14px 10px;
            text-align:center;
        }

        .benefit-card h3{
            color:#c6ff00;
            font-size:18px;
            margin-bottom:5px;
        }

        .benefit-card p{
            color:#bbb;
            font-size:11px;
            line-height:1.5;
        }

        .login-link{
            margin-top:25px;
            text-align:center;
            color:#bbb;
            font-size:14px;
        }

        .login-link a{
            color:#c6ff00;
            text-decoration:none;
            font-weight:600;
        }

        .bottom-glow{
            position:absolute;
            width:220px;
            height:220px;
            background:#c6ff00;
            filter:blur(140px);
            opacity:.08;
            bottom:-100px;
            left:50%;
            transform:translateX(-50%);
            pointer-events:none;
        }

        @media(max-width:480px){

            .mobile-screen{
                max-width:100%;
                padding:16px;
            }

        }

    </style>

</head>

<body>

<div class="mobile-screen">

    <a href="/food/delivery-login/" class="back-btn">
        ←
    </a>

    <div class="bike-box">
        🛵
    </div>

    <div class="brand">

        <h1>FUDDO</h1>

        <p>Become a Delivery Partner</p>

    </div>

    <div class="heading">

        <h2>Delivery Signup</h2>

        <p>
            Join FUDDO and start earning with
            flexible delivery opportunities.
        </p>

    </div>

    <div class="form">

        <div class="input-box">

            <label>Full Name</label>

            <input type="text" placeholder="Enter full name">

        </div>

        <div class="input-box">

            <label>Phone Number</label>

            <input type="text" placeholder="Enter phone number">

        </div>

        <div class="input-box">

            <label>Email Address</label>

            <input type="email" placeholder="Enter email">

        </div>

        <div class="input-box">

            <label>Vehicle Type</label>

            <input type="text" placeholder="Bike / Scooter">

        </div>

        <div class="input-box">

            <label>Create Password</label>

            <input type="password" placeholder="Create password">

        </div>

        <a href="/food/home/">

            <button class="signup-btn">
                Join as Partner →
            </button>

        </a>

    </div>

    <div class="benefits">

        <div class="benefit-card">

            <h3>₹850+</h3>

            <p>Daily Earning Potential</p>

        </div>

        <div class="benefit-card">

            <h3>24/7</h3>

            <p>Flexible Working Hours</p>

        </div>

    </div>

    <div class="login-link">

        Already a partner?

        <a href="/food/delivery-login/">
            Login Here
        </a>

    </div>

    <div class="bottom-glow"></div>

</div>

</body>
</html>
