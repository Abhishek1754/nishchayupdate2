
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Verify OTP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    background:black;

    color:#c6ff00;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

}

.container{

    width:90%;

    max-width:400px;

    background:#050505;

    border:2px solid #c6ff00;

    border-radius:20px;

    padding:40px;

    box-shadow:0 0 40px #c6ff00;

}

.logo{

    text-align:center;

    font-size:42px;

    font-weight:bold;

    color:#c6ff00;

    text-shadow:0 0 15px #c6ff00;

    margin-bottom:10px;

}

.subtitle{

    text-align:center;

    color:white;

    margin-bottom:30px;

}

.input-box{

    margin-bottom:20px;

}

.input-box input{

    width:100%;

    padding:15px;

    background:black;

    border:1px solid #c6ff00;

    border-radius:10px;

    color:white;

    font-size:20px;

    letter-spacing:5px;

    text-align:center;

    outline:none;

}

.input-box input:focus{

    box-shadow:0 0 15px #c6ff00;

}

.verify-btn{

    width:100%;

    padding:15px;

    background:#c6ff00;

    border:none;

    border-radius:10px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;

}

.verify-btn:hover{

    background:black;

    color:#c6ff00;

    border:1px solid #c6ff00;

    box-shadow:0 0 20px #c6ff00;

}

.back-link{

    margin-top:20px;

    text-align:center;

}

.back-link a{

    color:#c6ff00;

    text-decoration:none;

    font-weight:bold;

}

.glow{

    position:absolute;

    width:500px;

    height:500px;

    background:#c6ff00;

    filter:blur(200px);

    opacity:0.12;

    z-index:-1;

}

.glow1{

    top:-100px;

    left:-100px;

}

.glow2{

    bottom:-100px;

    right:-100px;

}

@media(max-width:768px){

.container{

    width:90%;

    padding:30px 20px;

}

.logo{

    font-size:34px;

}

}

</style>

</head>

<body>

<div class="glow glow1"></div>

<div class="glow glow2"></div>

<div class="container">

<div class="logo">

NISHCHAY

</div>

<div class="subtitle">

Enter 6-Digit OTP

</div>

<form onsubmit="verifyOTP(event)">

<div class="input-box">

<input
type="text"
maxlength="6"
id="otp"
placeholder="000000"
required>

</div>

<button
class="verify-btn"
type="submit">

VERIFY OTP

</button>

</form>

<div class="back-link">

<a href="/forgot-password/">

← Back

</a>

</div>

</div>


<script>

async function verifyOTP(event){

    event.preventDefault();

    const otp = document.getElementById(
        'otp'
    ).value;

    const email = localStorage.getItem(
        'reset_email'
    );

    try{

        const response = await fetch(

            '/api/verify-reset-otp/',

            {

                method:'POST',

                headers:{

                    'Content-Type':'application/json'

                },

                body:JSON.stringify({

                    email:email,

                    otp:otp

                })

            }

        );

        const data = await response.json();

        if(response.ok){

            alert(

                "OTP Verified Successfully"

            );

            window.location.href =

            "/reset-password/";

        }

        else{

            alert(

                data.error

            );

        }

    }

    catch(error){

        console.log(error);

        alert(

            "Server Error"

        );

    }

}

</script>



</body>

</html>
