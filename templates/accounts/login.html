<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

   <meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Nishchay Login</title>

    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{

            background:black;

            color:#c6ff00;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            overflow:hidden;

        }

       .container{

    width:90%;

    max-width:400px;

    background:#050505;

    border:2px solid #c6ff00;

    border-radius:20px;

    padding:40px;

    box-shadow:0 0 40px #c6ff00;

}

     .logo{

    text-align:center;

    font-size:42px;

    font-weight:bold;

    color:#c6ff00;

    text-shadow:0 0 15px #c6ff00;

    margin-bottom:10px;

}
        .subtitle{

            text-align:center;

            color:white;

            margin-bottom:30px;

        }

        .input-box{

            margin-bottom:20px;

        }

        .input-box input{

            width:100%;

            padding:15px;

            background:black;

            border:1px solid #c6ff00;

            border-radius:10px;

            color:white;

            font-size:16px;

            outline:none;

        }

        .input-box input:focus{

            box-shadow:0 0 15px #c6ff00;

        }

        .password-box{

    position:relative;

}

.password-box i{

    position:absolute;

    right:18px;

    top:50%;

    transform:translateY(-50%);

    color:#c6ff00;

    cursor:pointer;

    font-size:18px;

}

        .login-btn{

            width:100%;

            padding:15px;

            background:#c6ff00;

            border:none;

            border-radius:10px;

            font-size:18px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;

        }

        .login-btn:hover{

            background:black;

            color:#c6ff00;

            border:1px solid #c6ff00;

            box-shadow:0 0 20px #c6ff00;

        }

        .register-link{

            margin-top:20px;

            text-align:center;

            color:white;

        }

        .register-link a{

            color:#c6ff00;

            text-decoration:none;

            font-weight:bold;

        }

        .glow{

            position:absolute;

            width:500px;

            height:500px;

            background:#c6ff00;

            filter:blur(200px);

            opacity:0.12;

            z-index:-1;

        }

        .glow1{

            top:-100px;

            left:-100px;

        }

        .glow2{

            bottom:-100px;

            right:-100px;

        }
        @media(max-width:768px){

    .container{

        width:90%;

        padding:30px 20px;

    }

    .logo{

        font-size:34px;

    }

    .subtitle{

        font-size:14px;

    }

}

    </style>

</head>

<body>

<div class="glow glow1"></div>

<div class="glow glow2"></div>

<div class="container">

    <div class="logo">

        NISHCHAY

    </div>

    <div class="subtitle">

        Login To Your Multiverse

    </div>
    <form onsubmit="loginUser(event)">

        <div class="input-box">

            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required
            >

        </div>

        <div class="input-box password-box">

    <input
        type="password"
        id="password"
        placeholder="Password"
        required
    >

    <i
        class="fa-regular fa-eye"
        id="togglePassword"
    ></i>

</div>

        <button
            class="login-btn"
            type="submit"
        >

            LOGIN

        </button>

        <div
style="
margin-top:15px;
text-align:center;
">

    <a
    href="/forgot-password/"
    style="
    color:#c6ff00;
    text-decoration:none;
    font-size:14px;
    ">

        Forgot Password?

    </a>

</div>

    </form>

    <div class="register-link">

        Don't have account?

        <a href="/register/">

            Register

        </a>

    </div>

</div>

<script>

    const togglePassword =
document.getElementById("togglePassword");

const password =
document.getElementById("password");

togglePassword.addEventListener(

    "click",

    function(){

        if(password.type === "password"){

            password.type = "text";

            this.classList.remove(
                "fa-eye"
            );

            this.classList.add(
                "fa-eye-slash"
            );

        }

        else{

            password.type = "password";

            this.classList.remove(
                "fa-eye-slash"
            );

            this.classList.add(
                "fa-eye"
            );

        }

    }

);

async function loginUser(event){

    event.preventDefault();

    try{

        const response = await fetch(

            '/api/login/',

            {

                method:'POST',

                headers:{
                    'Content-Type':'application/json'
                },

                body:JSON.stringify({

                    email:
                        document.getElementById('email').value,

                    password:
                        document.getElementById('password').value

                })

            }

        );

        const data = await response.json();

        console.log(data);

        if(data.access){

            localStorage.setItem(
                'access',
                data.access
            );

            localStorage.setItem(
                'refresh',
                data.refresh
            );

            localStorage.setItem(
                'email',
                data.email
            );

            localStorage.setItem(
               'username',
               data.username
            );

            localStorage.setItem(
                'wallet_balance',
                data.wallet_balance
            );

            localStorage.setItem(
                'referral_code',
                data.referral_code
            );

            localStorage.setItem(
            'nishchay_coin',
            data.nishchay_coin
            );

            // Speak Welcome Message
const username = data.username || "User";

const speech = new SpeechSynthesisUtterance(
    `Welcome back ${username}. Welcome to Nishchay Multiverse. We are happy to see you again.`
);;

speech.lang = "en-IN";
speech.rate = 0.95;
speech.pitch = 1;
speech.volume = 1;

// Stop any previous speech
window.speechSynthesis.cancel();

// Speak
window.speechSynthesis.speak(speech);

// Show success message
alert("Login Successful");

// After speaking, redirect
speech.onend = function () {
    window.location.href = "/";
};

// Fallback redirect after 5 seconds
setTimeout(function () {
    window.location.href = "/";
}, 5000);

            

        }

        else{

            alert(
                data.error ||
                "Invalid Credentials"
            );

        }

    }

    catch(error){

        console.log(error);

        alert('Server Error');

    }

}

</script>

</body>

</html>
