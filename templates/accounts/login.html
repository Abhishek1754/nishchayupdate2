<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nishchay Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{

            background:black;

            color:#c6ff00;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            overflow:hidden;

        }

        .container{

            width:400px;

            background:#050505;

            border:2px solid #c6ff00;

            border-radius:20px;

            padding:40px;

            box-shadow:0 0 40px #c6ff00;

        }

        .logo{

            text-align:center;

            font-size:42px;

            font-weight:bold;

            color:#c6ff00;

            text-shadow:0 0 15px #c6ff00;

            margin-bottom:10px;

        }

        .subtitle{

            text-align:center;

            color:white;

            margin-bottom:30px;

        }

        .input-box{

            margin-bottom:20px;

        }

        .input-box input{

            width:100%;

            padding:15px;

            background:black;

            border:1px solid #c6ff00;

            border-radius:10px;

            color:white;

            font-size:15px;

            outline:none;

        }

        .input-box input:focus{

            box-shadow:0 0 15px #c6ff00;

        }

        .login-btn{

            width:100%;

            padding:15px;

            background:#c6ff00;

            border:none;

            border-radius:10px;

            font-size:18px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;

        }

        .login-btn:hover{

            background:black;

            color:#c6ff00;

            border:1px solid #c6ff00;

            box-shadow:0 0 20px #c6ff00;

        }

        .register-link{

            margin-top:20px;

            text-align:center;

            color:white;

        }

        .register-link a{

            color:#c6ff00;

            text-decoration:none;

            font-weight:bold;

        }

        .glow{

            position:absolute;

            width:500px;

            height:500px;

            background:#c6ff00;

            filter:blur(200px);

            opacity:0.12;

            z-index:-1;

        }

        .glow1{

            top:-100px;

            left:-100px;

        }

        .glow2{

            bottom:-100px;

            right:-100px;

        }

    </style>

</head>

<body>

<div class="glow glow1"></div>

<div class="glow glow2"></div>

<div class="container">

    <div class="logo">

        NISHCHAY

    </div>

    <div class="subtitle">

        Login To Your Multiverse

    </div>

    <form onsubmit="loginUser(event)">

        <div class="input-box">

            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required
            >

        </div>

        <div class="input-box">

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

        </div>

        <button
            class="login-btn"
            type="submit"
        >

            LOGIN

        </button>

    </form>

    <div class="register-link">

        Don't have account?

        <a href="/register/">

            Register

        </a>

    </div>

</div>

<script>

async function loginUser(event){

    event.preventDefault();

    try{

        const response = await fetch(

            '/api/login/',

            {

                method:'POST',

                headers:{
                    'Content-Type':'application/json'
                },

                body:JSON.stringify({

                    email:
                        document.getElementById('email').value,

                    password:
                        document.getElementById('password').value

                })

            }

        );

        const data = await response.json();

        console.log(data);

        if(data.access){

            localStorage.setItem(
                'access',
                data.access
            );

            localStorage.setItem(
                'refresh',
                data.refresh
            );

            localStorage.setItem(
                'email',
                data.email
            );

            localStorage.setItem(
                'wallet_balance',
                data.wallet_balance
            );

            localStorage.setItem(
                'referral_code',
                data.referral_code
            );

            localStorage.setItem(
            'nishchay_coin',
            data.nishchay_coin
            );

            alert('Login Successful');

            window.location.href='/';

        }

        else{

            alert(
                data.error ||
                "Invalid Credentials"
            );

        }

    }

    catch(error){

        console.log(error);

        alert('Server Error');

    }

}

</script>

</body>

</html>
