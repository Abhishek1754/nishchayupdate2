<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>My Team</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:white;
}

.container{
width:95%;
margin:auto;
padding:30px 0;
}

.back-btn{
display:inline-block;
padding:15px 25px;
background:#b7ff00;
color:black;
text-decoration:none;
border-radius:15px;
font-weight:700;
margin-bottom:30px;
}

.heading{
font-size:50px;
color:#b7ff00;
margin-bottom:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#050505;
border:1px solid rgba(183,255,0,.2);
border-radius:20px;
padding:25px;
}

.card p{
color:#999;
margin-bottom:15px;
}

.card h1{
font-size:40px;
color:#b7ff00;
}

.level-buttons{
display:flex;
gap:15px;
margin-bottom:25px;
flex-wrap:wrap;
}

.level-btn{
background:#111;
border:1px solid #b7ff00;
color:#b7ff00;
padding:15px 25px;
border-radius:15px;
cursor:pointer;
font-weight:600;
}

.level-btn:hover{
background:#b7ff00;
color:black;
}

.search-box{
margin-bottom:25px;
}

.search-box input{
width:100%;
height:60px;
background:#050505;
border:1px solid rgba(183,255,0,.25);
border-radius:15px;
padding:0 20px;
color:white;
font-size:17px;
outline:none;
}

.table-box{
background:#050505;
border:1px solid rgba(183,255,0,.2);
border-radius:20px;
padding:25px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#b7ff00;
color:black;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #222;
}

tr:hover{
background:#111;
}

@media(max-width:1100px){

.cards{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:700px){

.heading{
font-size:35px;
}

.cards{
grid-template-columns:1fr;
}

.card h1{
font-size:30px;
}

}

</style>

</head>

<body>

<div class="container">

<a href="/recharge/" class="back-btn">
← Dashboard
</a>

<h1 class="heading">
My Team
</h1>

<div class="cards">

<div class="card">
<p>Total Team</p>
<h1 id="totalTeam">0</h1>
</div>

<div class="card">
<p>Level 1 Team</p>
<h1 id="level1Count">0</h1>
</div>

<div class="card">
<p>Level 2 Team</p>
<h1 id="level2Count">0</h1>
</div>

<div class="card">
<p>Level 3 Team</p>
<h1 id="level3Count">0</h1>
</div>

</div>


<div class="level-buttons">

<button class="level-btn"
onclick="showLevel(1)">
Level 1
</button>

<button class="level-btn"
onclick="showLevel(2)">
Level 2
</button>

<button class="level-btn"
onclick="showLevel(3)">
Level 3
</button>

</div>


<div class="search-box">

<input
type="text"
id="search"
placeholder="Search Team Member"
onkeyup="searchTeam()"
>

</div>


<div class="table-box">

<table>

<thead>

<tr>

<th>Name</th>
<th>Phone</th>
<th>Join Date</th>

</tr>

</thead>

<tbody id="teamTable">

</tbody>

</table>

</div>

</div>


<script>

let level1Members = [];
let level2Members = [];
let level3Members = [];

async function loadTeam(){

const response =
await fetch(
"/recharge/api/team/",
{
headers:{
Authorization:
"Bearer " +
localStorage.getItem("access")
}
}
);

const data =
await response.json();

console.log(data);

document.getElementById(
"level1Count"
).innerText =
data.level1_count;

document.getElementById(
"level2Count"
).innerText =
data.level2_count;

document.getElementById(
"level3Count"
).innerText =
data.level3_count;

document.getElementById(
"totalTeam"
).innerText =
data.total_team;

level1Members =
data.level1_members;

level2Members =
data.level2_members;

level3Members =
data.level3_members;

showLevel(1);

}



function showLevel(level){

let members = [];

if(level==1){

members = level1Members;

}

if(level==2){

members = level2Members;

}

if(level==3){

members = level3Members;

}

let html = "";

members.forEach(item=>{

html += `

<tr>

<td>${item.name}</td>

<td>${item.phone}</td>

<td>${item.join_date}</td>

</tr>

`;

});

document.getElementById(
"teamTable"
).innerHTML =
html;

}



function searchTeam(){

const value =
document.getElementById(
"search"
).value.toLowerCase();

document.querySelectorAll(
"#teamTable tr"
).forEach(row=>{

row.style.display =

row.innerText.toLowerCase().includes(value)

? ""

: "none";

});

}

loadTeam();

</script>

</body>
</html>
