
<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>
My Team
</title>

<style>

body{

background:black;
color:white;
font-family:Arial;
padding:20px;

}

.card{

background:#111;
padding:20px;
border-radius:10px;
margin-bottom:20px;

}

table{

width:100%;
border-collapse:collapse;

}

th,td{

padding:12px;
border:1px solid #333;

}

th{

background:#b7ff00;
color:black;

}

input{

width:100%;
padding:12px;
margin-bottom:20px;

}

</style>

</head>

<body>

<a href="/recharge/team/" class="active">
My Team
</a>

<div class="card">

Direct Team:
<span id="directTeam">
0
</span>

</div>

<input
type="text"
id="search"
placeholder="Search Team"
onkeyup="searchTeam()"
>

<table>

<thead>

<tr>

<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Join Date</th>

</tr>

</thead>

<tbody
id="teamTable"
>

</tbody>

</table>

<script>

async function loadTeam(){

    const token =
    localStorage.getItem(
        "access"
    );

    const response =
    await fetch(
        "/recharge/api/team/",
        {
            headers:{
                Authorization:
                `Bearer ${token}`
            }
        }
    );

    const data =
    await response.json();

    document.getElementById(
        "directTeam"
    ).innerText =
    data.direct_team;

    let html = "";

    data.members.forEach(item => {

        html += `

        <tr>

        <td>${item.name}</td>

        <td>${item.email}</td>

        <td>${item.phone}</td>

        <td>${item.join_date}</td>

        </tr>

        `;

    });

    document.getElementById(
        "teamTable"
    ).innerHTML =
    html;

}

function searchTeam(){

    const value =
    document
    .getElementById(
        "search"
    )
    .value
    .toLowerCase();

    document
    .querySelectorAll(
        "#teamTable tr"
    )
    .forEach(row => {

        row.style.display =

        row.innerText
        .toLowerCase()
        .includes(value)

        ? ""

        : "none";

    });

}

loadTeam();

</script>

</body>
</html>
