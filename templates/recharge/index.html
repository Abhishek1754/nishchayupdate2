{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nishchay Recharge</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#000;
    color:white;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;

}

body::before{

    content:'';
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top left,#b7ff0020,transparent 30%),
    radial-gradient(circle at bottom right,#00ffcc15,transparent 30%);
    z-index:-1;

}

.container{

    width:100%;
    padding:40px;

}

.heading{

    font-size:58px;
    font-family:'Orbitron',sans-serif;
    color:#b7ff00;
    margin-bottom:10px;
    text-shadow:0 0 20px #b7ff00;

}

.subheading{

    color:#aaa;
    margin-bottom:40px;
    font-size:18px;

}

.recharge-box{

    background:#050505;
    border:1px solid rgba(183,255,0,.2);
    border-radius:30px;
    padding:40px;
    box-shadow:
    0 0 40px rgba(183,255,0,.08);

}

.tabs{

    display:flex;
    gap:30px;
    margin-bottom:35px;

}

.tabs label{

    font-size:18px;
    color:#fff;

}

.form-grid{

    display:grid;
    grid-template-columns:1fr 1fr 1fr 280px;
    gap:20px;

}

.input{

    height:70px;
    border-radius:18px;
    border:1px solid rgba(183,255,0,.3);
    background:#000;
    color:white;
    padding:0 25px;
    font-size:18px;
    outline:none;
    transition:.3s;

}

.input:focus{

    border-color:#b7ff00;
    box-shadow:0 0 15px #b7ff0050;

}

.btn{

    border:none;
    border-radius:18px;
    background:#b7ff00;
    color:#000;
    font-size:22px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
    font-family:'Orbitron',sans-serif;

}

.btn:hover{

    transform:translateY(-3px);
    box-shadow:0 0 25px #b7ff00;

}

.wallet-card{

    margin-top:40px;
    background:#050505;
    border:1px solid rgba(183,255,0,.2);
    border-radius:25px;
    padding:30px;
    display:flex;
    justify-content:space-between;
    align-items:center;

}

.wallet-title{

    color:#aaa;
    font-size:18px;

}

.wallet-balance{

    font-size:42px;
    color:#b7ff00;
    font-family:'Orbitron',sans-serif;
    text-shadow:0 0 15px #b7ff00;

}

.section{

    margin-top:40px;
    background:#050505;
    border-radius:30px;
    padding:35px;
    border:1px solid rgba(183,255,0,.2);

}

.section-top{

    display:flex;
    justify-content:space-between;
    margin-bottom:30px;

}

.section-top h2{

    color:#b7ff00;
    font-size:40px;
    font-family:'Orbitron',sans-serif;

}

.section-top span{

    color:#fff;
    cursor:pointer;

}

.operator-grid{

    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:25px;

}

.operator{

    text-align:center;

}

.operator-circle{

    width:100px;
    height:100px;
    border-radius:50%;
    border:2px solid rgba(183,255,0,.4);
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    font-size:36px;
    color:#b7ff00;
    margin-bottom:15px;
    transition:.3s;

}

.operator-circle:hover{

    transform:scale(1.08);
    box-shadow:0 0 25px #b7ff00;

}

.operator p{

    font-size:18px;

}

.glow{

    color:#b7ff00;
    text-shadow:0 0 15px #b7ff00;

}

@media(max-width:1200px){

.form-grid{

    grid-template-columns:1fr;

}

.operator-grid{

    grid-template-columns:repeat(2,1fr);

}

.heading{

    font-size:40px;

}

}

</style>

</head>

<body>

<div class="container">

<h1 class="heading">
NISHCHAY RECHARGE
</h1>

<p class="subheading">
Fast • Secure • Cashback Enabled
</p>

<div class="recharge-box">

<div class="tabs">

<label>
<input type="radio" checked>
Mobile
</label>

<label>
<input type="radio">
DTH
</label>

<label>
<input type="radio">
Electricity
</label>

<label>
<input type="radio">
Fastag
</label>

</div>

<div class="form-grid">

<input
type="text"
id="mobile"
class="input"
placeholder="Enter Mobile Number"
>

<select
id="provider"
class="input"
>

<option value="">
Select Operator
</option>

</select>

<input
type="number"
id="amount"
class="input"
placeholder="Enter Amount"
>

<button
class="btn"
onclick="doRecharge()"
>
Recharge
</button>

</div>

</div>

<div class="wallet-card">

<div>

<p class="wallet-title">
Wallet Balance
</p>

<h2 class="wallet-balance">
₹ <span id="walletBalance">0</span>
</h2>

</div>

<div>

<h2 class="glow">
Welcome,
<span id="username">
User
</span>
</h2>

</div>

</div>

<div class="section">

<div class="section-top">

<h2>Popular Operators</h2>

<span>
View All
</span>

</div>

<div class="operator-grid">

<div class="operator">
<div class="operator-circle">J</div>
<p>Jio</p>
</div>

<div class="operator">
<div class="operator-circle">A</div>
<p>Airtel</p>
</div>

<div class="operator">
<div class="operator-circle">V</div>
<p>Vi</p>
</div>

<div class="operator">
<div class="operator-circle">B</div>
<p>BSNL</p>
</div>

<div class="operator">
<div class="operator-circle">D</div>
<p>DTH</p>
</div>

</div>

</div>

</div>

<script>

const access =
localStorage.getItem('access');

async function loadUser(){

    try{

        const response =
        await fetch(
            '/api/profile/',
            {
                headers:{
                    'Authorization':
                    'Bearer ' + access
                }
            }
        );

        const data =
        await response.json();

        document.getElementById(
            'walletBalance'
        ).innerText =
        data.wallet_balance || 0;

        document.getElementById(
            'username'
        ).innerText =
        data.first_name || 'User';

    }catch(error){

        console.log(error);

    }

}

async function loadProviders(){

    try{

        const response =
        await fetch(
            '/recharge/api/providers/'
        );

        const data =
        await response.json();

        console.log(data);

        const providerSelect =
        document.getElementById(
            'provider'
        );

        providerSelect.innerHTML =
        `<option value="">
            Select Operator
        </option>`;

        data.forEach(provider => {

            providerSelect.innerHTML += `

            <option value="${provider.id}">
                ${provider.name}
            </option>

            `;

        });

    }catch(error){

        console.log(error);

    }

}

async function doRecharge(){

    const provider =
    document.getElementById(
        'provider'
    ).value;

    const mobile =
    document.getElementById(
        'mobile'
    ).value;

    const amount =
    document.getElementById(
        'amount'
    ).value;

    if(!provider){

        alert('Select Operator');
        return;

    }

    if(!mobile){

        alert('Enter Mobile Number');
        return;

    }

    if(!amount){

        alert('Enter Amount');
        return;

    }

    try{

        const response =
        await fetch(
            '/recharge/api/do-recharge/',
            {

                method:'POST',

                headers:{
                    'Content-Type':
                    'application/json',
                    'Authorization':
                    'Bearer ' + access
                },

                body:JSON.stringify({

                    provider_id:provider,
                    mobile_number:mobile,
                    amount:amount

                })

            }
        );

        const data =
        await response.json();

        console.log(data);

        if(response.ok){

            alert('Recharge Successful');

            window.location.reload();

        }else{

            alert(
                data.error ||
                data.message ||
                'Recharge Failed'
            );

        }

    }catch(error){

        console.log(error);

        alert('Server Error');

    }

}

window.onload = function(){

    loadUser();

    loadProviders();

}

</script>

</body>
</html>
