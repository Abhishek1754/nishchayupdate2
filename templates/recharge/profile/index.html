<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:black;
color:white;
}

.container{
width:95%;
margin:auto;
padding:30px 0;
}

.back-btn{
display:inline-block;
padding:15px 25px;
background:#b7ff00;
color:black;
font-weight:700;
text-decoration:none;
border-radius:15px;
margin-bottom:30px;
}

.heading{
font-size:45px;
color:#b7ff00;
margin-bottom:30px;
}

.profile-card{
background:#050505;
border:1px solid rgba(183,255,0,.2);
border-radius:20px;
padding:40px;
margin-bottom:30px;
text-align:center;
}

.avatar{

width:120px;
height:120px;
border-radius:50%;
background:#b7ff00;
color:black;
font-size:50px;
font-weight:700;

display:flex;
justify-content:center;
align-items:center;

margin:auto;
margin-bottom:25px;

}

.name{
font-size:35px;
color:#b7ff00;
margin-bottom:10px;
}

.info{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;

}

.box{

background:#050505;
border:1px solid rgba(183,255,0,.2);
padding:25px;
border-radius:20px;

}

.box p{
color:#999;
margin-bottom:15px;
}

.box h2{
color:#b7ff00;
}

@media(max-width:700px){

.info{
grid-template-columns:1fr;
}

.heading{
font-size:30px;
}

.name{
font-size:28px;
}

}

</style>

</head>

<body>

<div class="container">

<a
href="/recharge/"
class="back-btn"
>

← Dashboard

</a>


<h1 class="heading">

My Profile

</h1>



<div class="profile-card">

<div
class="avatar"
id="avatar"
>

U

</div>

<div
class="name"
id="name"
>

User

</div>

<p id="email">

-

</p>

</div>



<div class="info">

<div class="box">

<p>Phone Number</p>

<h2 id="phone">

-

</h2>

</div>


<div class="box">

<p>Referral Code</p>

<h2 id="referralCode">

-

</h2>

</div>


<div class="box">

<p>Wallet Balance</p>

<h2>

₹<span id="wallet">

0

</span>

</h2>

</div>


<div class="box">

<p>Total Income</p>

<h2>

₹<span id="income">

0

</span>

</h2>

</div>


<div class="box">

<p>Total Transactions</p>

<h2 id="transactions">

0

</h2>

</div>


<div class="box">

<p>Direct Team</p>

<h2 id="team">

0

</h2>

</div>

</div>

</div>



<script>

async function loadProfile(){

const response =
await fetch(

"/recharge/api/profile-summary/",

{

headers:{

Authorization:
"Bearer " +
localStorage.getItem(
"access"
)

}

}

);

const data =
await response.json();

console.log(data);


document.getElementById(
"name"
).innerText =

data.first_name +

" " +

data.last_name;


document.getElementById(
"avatar"
).innerText =

data.first_name.charAt(
0
);


document.getElementById(
"email"
).innerText =

data.email;


document.getElementById(
"phone"
).innerText =

data.phone;


document.getElementById(
"referralCode"
).innerText =

data.referral_code;


document.getElementById(
"wallet"
).innerText =

data.wallet_balance;


document.getElementById(
"income"
).innerText =

data.total_income;


document.getElementById(
"transactions"
).innerText =

data.total_transactions;


document.getElementById(
"team"
).innerText =

data.direct_team;

}

loadProfile();

</script>

</body>
</html>
