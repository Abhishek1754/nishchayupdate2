{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mobile Recharge</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
font-family:'Poppins',sans-serif;
color:white;
}

.container{
padding:20px;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
border:1px solid rgba(183,255,0,.2);
border-radius:18px;
margin-bottom:20px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo-circle{
width:55px;
height:55px;
border-radius:50%;
border:2px solid #b7ff00;
display:flex;
justify-content:center;
align-items:center;
color:#b7ff00;
font-size:25px;
box-shadow:0 0 15px rgba(183,255,0,.5);
}

.logo h1{
font-size:40px;
color:#b7ff00;
}

.logo span{
color:white;
}

.right-nav{
display:flex;
gap:20px;
align-items:center;
}

.wallet{
padding:14px 22px;
border:1px solid rgba(183,255,0,.3);
border-radius:14px;
}

.profile{
padding:12px 20px;
border:1px solid rgba(183,255,0,.2);
border-radius:14px;
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#b7ff00;
color:black;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
}

.main{
display:grid;
grid-template-columns:1fr 400px;
gap:20px;
}

.left{
border:1px solid rgba(183,255,0,.2);
border-radius:20px;
padding:30px;
}

.right{
border:1px solid rgba(183,255,0,.2);
border-radius:20px;
padding:30px;
}

.section-title{
font-size:30px;
margin-bottom:20px;
color:#b7ff00;
}

.input-box{
margin-bottom:25px;
}

.input-box input,
.input-box select{

width:100%;
height:70px;
background:#050505;
border:1px solid rgba(183,255,0,.25);
border-radius:16px;
padding:0 20px;
color:white;
font-size:18px;
outline:none;

}

.plans{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.plan{
border:1px solid rgba(183,255,0,.25);
border-radius:16px;
padding:20px;
cursor:pointer;
transition:.3s;
}

.plan:hover{
border:2px solid #b7ff00;
}

.plan h1{
font-size:40px;
margin-bottom:10px;
}

.plan button{
margin-top:15px;
width:100%;
height:50px;
background:#b7ff00;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.wallet-card{
margin-top:30px;
padding:25px;
border:1px solid rgba(183,255,0,.25);
border-radius:20px;
}

.wallet-card h1{
font-size:50px;
color:#b7ff00;
margin-top:10px;
}

.pay-btn{
width:100%;
height:70px;
background:#b7ff00;
border:none;
border-radius:16px;
font-size:22px;
font-weight:700;
cursor:pointer;
margin-top:30px;
}

.pay-btn:hover{
background:#d0ff4b;
}

@media(max-width:1100px){

.main{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<div class="navbar">

<div class="logo">

<div class="logo-circle">⚡</div>

<h1>Re<span>Charge</span></h1>

</div>

<div class="right-nav">

<div class="wallet">

₹<span id="walletBalance">0</span>

</div>

<div class="profile">

<div class="avatar" id="avatarLetter">
U
</div>

<div>

Hi,
<span id="username">
User
</span>

</div>

</div>

</div>

</div>

<div class="main">

<!-- LEFT -->

<div class="left">

<h2 class="section-title">

Mobile Recharge

</h2>

<div class="input-box">

<input
type="text"
id="mobile"
placeholder="Enter Mobile Number"
>

</div>

<div class="input-box">

<select id="provider">

<option value="">
Select Operator
</option>

</select>

</div>

<div class="input-box">

<select id="circle">

<option>Bihar</option>
<option>Jharkhand</option>
<option>UP East</option>
<option>Delhi</option>

</select>

</div>

<div class="input-box">

<input
type="number"
id="amount"
placeholder="Enter Recharge Amount"
>

</div>

<button
class="pay-btn"
onclick="doRecharge()"
>

Proceed Recharge →

</button>

</div>

<!-- RIGHT -->

<div class="right">

<h2 class="section-title">

Popular Plans

</h2>

<div class="plans">

<div class="plan">

<h1>₹199</h1>

<p>28 Days</p>

<p>1.5GB/day</p>

<button onclick="selectPlan(199)">
Select
</button>

</div>

<div class="plan">

<h1>₹249</h1>

<p>28 Days</p>

<p>2GB/day</p>

<button onclick="selectPlan(249)">
Select
</button>

</div>

<div class="plan">

<h1>₹399</h1>

<p>56 Days</p>

<p>2GB/day</p>

<button onclick="selectPlan(399)">
Select
</button>

</div>

<div class="plan">

<h1>₹599</h1>

<p>84 Days</p>

<p>2GB/day</p>

<button onclick="selectPlan(599)">
Select
</button>

</div>

</div>

<div class="wallet-card">

<p>Wallet Balance</p>

<h1>

₹<span id="walletBalance2">
0
</span>

</h1>

</div>

</div>

</div>

</div>

<script>

const access =
localStorage.getItem('access');

async function loadUser(){

try{

const response =
await fetch('/api/profile/',{

headers:{
'Authorization':
'Bearer ' + access
}

});

const data =
await response.json();

document.getElementById(
'walletBalance'
).innerText =
data.wallet_balance;

document.getElementById(
'walletBalance2'
).innerText =
data.wallet_balance;

document.getElementById(
'username'
).innerText =
data.first_name;

document.getElementById(
'avatarLetter'
).innerText =
data.first_name.charAt(0);

}catch(error){

console.log(error);

}

}

async function loadProviders(){

try{

const response =
await fetch(
'/recharge/api/providers/'
);

const data =
await response.json();

const providerSelect =
document.getElementById(
'provider'
);

data.forEach(provider=>{

providerSelect.innerHTML += `

<option value="${provider.id}">
${provider.name}
</option>

`;

});

}catch(error){

console.log(error);

}

}

function selectPlan(amount){

document.getElementById(
'amount'
).value = amount;

}

async function doRecharge(){

const provider =
document.getElementById(
'provider'
).value;

const mobile =
document.getElementById(
'mobile'
).value;

const amount =
document.getElementById(
'amount'
).value;

if(!provider){

alert('Select Provider');

return;

}

if(!mobile){

alert('Enter Mobile Number');

return;

}

if(!amount){

alert('Enter Amount');

return;

}

try{

const response =
await fetch(
'/recharge/api/do-recharge/',
{

method:'POST',

headers:{

'Content-Type':
'application/json',

'Authorization':
'Bearer ' + access

},

body:JSON.stringify({

provider_id:provider,
mobile_number:mobile,
amount:amount

})

}
);

const data =
await response.json();

console.log(data);

if(response.ok){

alert(
'Recharge Successful'
);

window.location.reload();

}else{

alert(
data.error ||
data.message
);

}

}catch(error){

console.log(error);

alert('Server Error');

}

}

loadUser();

loadProviders();

</script>

</body>

</html>
