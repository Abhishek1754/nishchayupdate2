<!DOCTYPE html>
<html>

<head>

<title>Payment Successful</title>

<style>

body{

background:#000;

color:#c6ff00;

font-family:Arial;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

flex-direction:column;

}

.loader{

width:70px;

height:70px;

border:6px solid #222;

border-top:6px solid #c6ff00;

border-radius:50%;

animation:spin 1s linear infinite;

margin-bottom:30px;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

h1{

margin-bottom:15px;

}

p{

color:white;

}

</style>

</head>

<body>

<div class="loader"></div>

<h1>

Payment Successful

</h1>

<p>

Please wait...

Your recharge is being processed.

</p>

<script>

async function doRecharge(){

try{

const access =
localStorage.getItem("access");

const response =
await fetch(

"/recharge/api/do-recharge/",

{

method:"POST",

headers:{

"Content-Type":"application/json",

"Authorization":"Bearer "+access

},

body:JSON.stringify({

    provider_id:"{{ provider_id }}",

    mobile_number:"{{ mobile_number }}",

    amount:"{{ amount }}",

    coupon_code:"{{ coupon_code }}"

})

}

);

const data =
await response.json();

if(response.ok){

window.location.href=
"/recharge/transactions/";

}
else{

alert(data.message);

window.location.href=
"/recharge/mobile/";

}

}catch(e){

alert("Server Error");

window.location.href=
"/recharge/mobile/";

}

}

doRecharge();

</script>

</body>

</html>
