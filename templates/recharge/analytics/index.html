
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recharge Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:white;
}

.container{
width:95%;
margin:auto;
padding:30px 0;
}

.back-btn{
display:inline-block;
padding:15px 25px;
background:#b7ff00;
color:black;
text-decoration:none;
font-weight:700;
border-radius:15px;
margin-bottom:30px;
}

.heading{
font-size:45px;
color:#b7ff00;
margin-bottom:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#050505;
border:1px solid rgba(183,255,0,.2);
border-radius:20px;
padding:25px;
}

.card p{
color:#999;
margin-bottom:15px;
}

.card h1{
font-size:35px;
color:#b7ff00;
}

.progress-card{
background:#050505;
border:1px solid rgba(183,255,0,.2);
padding:30px;
border-radius:20px;
margin-bottom:30px;
}

.progress-card h2{
color:#b7ff00;
margin-bottom:25px;
}

.bar{

height:35px;
background:#111;
border-radius:40px;
overflow:hidden;

}

.fill{

height:100%;
width:0%;
background:#b7ff00;
color:black;
font-weight:700;

display:flex;
align-items:center;
justify-content:center;

}

.stats{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;

}

.stat-box{

background:#050505;
border:1px solid rgba(183,255,0,.2);
padding:25px;
border-radius:20px;

}

.stat-box h3{

color:#999;
margin-bottom:15px;

}

.stat-box h1{

color:#b7ff00;
font-size:32px;

}

@media(max-width:1000px){

.cards{
grid-template-columns:1fr;
}

.stats{
grid-template-columns:1fr;
}

.heading{
font-size:32px;
}

}

</style>

</head>

<body>

<div class="container">

<a
href="/recharge/"
class="back-btn"
>

← Dashboard

</a>

<h1 class="heading">

Recharge Analytics

</h1>


<div class="cards">

<div class="card">

<p>Total Recharge Amount</p>

<h1>

₹<span id="totalRecharge">

0

</span>

</h1>

</div>


<div class="card">

<p>Today's Recharge</p>

<h1>

₹<span id="todayRecharge">

0

</span>

</h1>

</div>


<div class="card">

<p>Total Transactions</p>

<h1>

<span id="totalCount">

0

</span>

</h1>

</div>

</div>



<div class="stats">

<div class="stat-box">

<h3>Successful</h3>

<h1>

<span id="successCount">

0

</span>

</h1>

</div>


<div class="stat-box">

<h3>Failed</h3>

<h1>

<span id="failedCount">

0

</span>

</h1>

</div>


<div class="stat-box">

<h3>Pending</h3>

<h1>

<span id="pendingCount">

0

</span>

</h1>

</div>

</div>



<div class="progress-card">

<h2>

Success Rate

</h2>

<div class="bar">

<div
class="fill"
id="successBar"
>

0%

</div>

</div>

</div>

</div>


<script>

async function loadAnalytics(){

const response =
await fetch(

"/recharge/api/recharge-analytics/",

{

headers:{

Authorization:
"Bearer " +
localStorage.getItem(
"access"
)

}

}

);

const data =
await response.json();

console.log(data);


document.getElementById(
"totalRecharge"
).innerText =
data.total_recharge;


document.getElementById(
"todayRecharge"
).innerText =
data.today_recharge;


document.getElementById(
"totalCount"
).innerText =
data.total_count;


document.getElementById(
"successCount"
).innerText =
data.success_count;


document.getElementById(
"failedCount"
).innerText =
data.failed_count;


document.getElementById(
"pendingCount"
).innerText =
data.pending_count;


document.getElementById(
"successBar"
).style.width =
data.success_rate + "%";


document.getElementById(
"successBar"
).innerText =
data.success_rate + "%";

}

loadAnalytics();

</script>

</body>
</html>
