
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wallet Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:white;
}

.container{
width:95%;
margin:auto;
padding:30px 0;
}

.back-btn{
display:inline-block;
padding:15px 25px;
background:#b7ff00;
color:black;
font-weight:700;
text-decoration:none;
border-radius:15px;
margin-bottom:30px;
}

.heading{
font-size:45px;
color:#b7ff00;
margin-bottom:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#050505;
border:1px solid rgba(183,255,0,.2);
border-radius:20px;
padding:25px;
}

.card p{
color:#999;
margin-bottom:15px;
}

.card h1{
font-size:35px;
color:#b7ff00;
}

.history{
background:#050505;
border:1px solid rgba(183,255,0,.2);
border-radius:20px;
padding:25px;
}

.history h2{
color:#b7ff00;
margin-bottom:25px;
}

.table{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#b7ff00;
color:black;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #222;
}

tr:hover{
background:#111;
}

@media(max-width:1100px){

.cards{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:700px){

.cards{
grid-template-columns:1fr;
}

.heading{
font-size:32px;
}

.card h1{
font-size:28px;
}

}

</style>

</head>

<body>

<div class="container">

<a
href="/recharge/"
class="back-btn"
>
← Dashboard
</a>

<h1 class="heading">
Wallet Dashboard
</h1>


<div class="cards">

<div class="card">
<p>Wallet Balance</p>
<h1>
₹<span id="walletBalance">
0
</span>
</h1>
</div>

<div class="card">
<p>Total Credits</p>
<h1>
₹<span id="totalCredit">
0
</span>
</h1>
</div>

<div class="card">
<p>Total Debits</p>
<h1>
₹<span id="totalDebit">
0
</span>
</h1>
</div>

<div class="card">
<p>Total Transactions</p>
<h1>
<span id="transactionCount">
0
</span>
</h1>
</div>

</div>



<div class="history">

<h2>
Wallet History
</h2>

<div class="table">

<table>

<thead>

<tr>

<th>Type</th>
<th>Amount</th>
<th>Remark</th>
<th>Date</th>

</tr>

</thead>

<tbody id="historyBody">

</tbody>

</table>

</div>

</div>

</div>



<script>

async function loadWallet(){

    // Wallet Balance
    const walletResponse =
    await fetch(
        "/recharge/api/wallet/",
        {
            headers:{
                Authorization:
                "Bearer " +
                localStorage.getItem("access")
            }
        }
    );

    const wallet =
    await walletResponse.json();


    document.getElementById(
        "walletBalance"
    ).innerText =
    wallet.balance;



    // Wallet History
    const historyResponse =
    await fetch(
        "/recharge/api/wallet-history/",
        {
            headers:{
                Authorization:
                "Bearer " +
                localStorage.getItem("access")
            }
        }
    );

    const history =
    await historyResponse.json();


    document.getElementById(
        "transactionCount"
    ).innerText =
    history.length;


    let totalCredit = 0;
    let totalDebit = 0;

    let html = "";


    history.forEach(item=>{

       if(
    item.transaction_type.toLowerCase() === "credit"
){

            totalCredit +=
            parseFloat(item.amount);

        }
        else{

            totalDebit +=
            parseFloat(item.amount);

        }


        html += `

        <tr>

            <td>
            ${item.transaction_type}
            </td>

            <td>
            ₹${item.amount}
            </td>

            <td>
            ${item.message}
            </td>

            <td>
            ${new Date(item.created_at).toLocaleString()}
           </td>

        </tr>

        `;

    });


    if(history.length==0){

        html = `

        <tr>

        <td colspan="4">

        No wallet history found

        </td>

        </tr>

        `;

    }


    document.getElementById(
        "totalCredit"
    ).innerText =
    totalCredit.toFixed(2);


    document.getElementById(
        "totalDebit"
    ).innerText =
    totalDebit.toFixed(2);


    document.getElementById(
        "historyBody"
    ).innerHTML =
    html;

}


loadWallet();

</script>

</body>
</html>
