
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cashback Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:white;
}

.container{
width:95%;
margin:auto;
padding:30px 0;
}

.back-btn{
display:inline-block;
padding:15px 25px;
background:#b7ff00;
color:black;
font-weight:700;
text-decoration:none;
border-radius:15px;
margin-bottom:30px;
}

.heading{
font-size:45px;
color:#b7ff00;
margin-bottom:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#050505;
border:1px solid rgba(183,255,0,.2);
border-radius:20px;
padding:25px;
}

.card p{
color:#999;
margin-bottom:15px;
}

.card h1{
font-size:35px;
color:#b7ff00;
}

.search-box{
margin-bottom:25px;
}

.search-box input{

width:100%;
height:60px;
background:#111;
border:1px solid rgba(183,255,0,.2);
border-radius:15px;
padding:0 20px;
font-size:18px;
color:white;
outline:none;

}

.history{
background:#050505;
border:1px solid rgba(183,255,0,.2);
border-radius:20px;
padding:25px;
}

.table{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#b7ff00;
color:black;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #222;
}

tr:hover{
background:#111;
}

@media(max-width:800px){

.cards{
grid-template-columns:1fr;
}

.heading{
font-size:32px;
}

}

</style>

</head>

<body>

<div class="container">

<a
href="/recharge/"
class="back-btn"
>

← Dashboard

</a>


<h1 class="heading">

Cashback Dashboard

</h1>



<div class="cards">

<div class="card">

<p>Total Cashback</p>

<h1>

₹<span id="totalCashback">

0

</span>

</h1>

</div>


<div class="card">

<p>Total Cashback Entries</p>

<h1>

<span id="totalEntries">

0

</span>

</h1>

</div>

</div>



<div class="search-box">

<input
type="text"
id="search"
placeholder="Search Mobile Number"
onkeyup="searchCashback()"
>

</div>



<div class="history">

<div class="table">

<table>

<thead>

<tr>

<th>Mobile</th>
<th>Recharge Amount</th>
<th>Cashback %</th>
<th>Cashback Earned</th>
<th>Date</th>

</tr>

</thead>

<tbody id="historyBody">

</tbody>

</table>

</div>

</div>

</div>



<script>

async function loadCashback(){

const response =
await fetch(

"/recharge/api/cashback-history/",

{

headers:{

Authorization:
"Bearer " +
localStorage.getItem(
"access"
)

}

}

);

const data =
await response.json();

console.log(data);


document.getElementById(
"totalCashback"
).innerText =
data.total_cashback;


document.getElementById(
"totalEntries"
).innerText =
data.count;


let html = "";

data.history.forEach(item=>{

html += `

<tr>

<td>
${item.mobile}
</td>

<td>
₹${item.amount}
</td>

<td>
${item.cashback_percentage}%
</td>

<td>
₹${item.cashback_amount}
</td>

<td>
${item.date}
</td>

</tr>

`;

});


if(data.history.length==0){

html = `

<tr>

<td colspan="5">

No Cashback Found

</td>

</tr>

`;

}


document.getElementById(
"historyBody"
).innerHTML =
html;

}



function searchCashback(){

let value =
document.getElementById(
"search"
).value.toLowerCase();

document
.querySelectorAll(
"#historyBody tr"
)
.forEach(row=>{

row.style.display =

row.innerText
.toLowerCase()
.includes(value)

?

""

:

"none";

});

}



loadCashback();

</script>

</body>
</html>
