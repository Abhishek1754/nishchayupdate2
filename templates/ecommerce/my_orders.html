<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>
</head>
<body style="background:#000;color:#b7ff00;font-family:Arial;">
    <h1>My Orders</h1>

    {% if orders %}
        {% for order in orders %}
            <p>Order #{{ order.id }}</p>
        {% empty %}
            <h3>No Orders Found</h3>
        {% endfor %}
    {% endif %}
</body>
</html>
