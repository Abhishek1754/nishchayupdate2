{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nishchay Shop Login</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#000;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

overflow:hidden;

position:relative;

}

.bg1{

position:absolute;

width:500px;

height:500px;

background:#b7ff00;

filter:blur(220px);

opacity:.12;

top:-150px;

left:-150px;

}

.bg2{

position:absolute;

width:500px;

height:500px;

background:#00ffcc;

filter:blur(220px);

opacity:.08;

bottom:-150px;

right:-150px;

}

.login-box{

position:relative;

width:430px;

background:#050505;

border:1px solid rgba(183,255,0,.18);

border-radius:25px;

padding:40px;

box-shadow:0 0 40px rgba(183,255,0,.08);

z-index:10;

}

.logo{

display:flex;

align-items:center;

justify-content:center;

gap:12px;

margin-bottom:25px;

}

.logo-circle{

width:60px;

height:60px;

border-radius:50%;

border:2px solid #b7ff00;

display:flex;

justify-content:center;

align-items:center;

font-size:28px;

color:#b7ff00;

}

.logo h1{

font-family:'Orbitron',sans-serif;

color:#b7ff00;

font-size:34px;

}

.logo span{

color:#fff;

}

.title{

text-align:center;

font-size:30px;

color:#fff;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#aaa;

margin-bottom:35px;

font-size:14px;

}

.input-group{

margin-bottom:20px;

}

.input-group label{

display:block;

margin-bottom:8px;

font-size:15px;

color:#ddd;

}

.input-group input{

width:100%;

height:58px;

background:#111;

border:1px solid rgba(183,255,0,.22);

border-radius:14px;

padding:0 18px;

color:#fff;

font-size:16px;

outline:none;

transition:.3s;

}

.input-group input:focus{

border-color:#b7ff00;

box-shadow:0 0 15px rgba(183,255,0,.2);

}

.password-box{

position:relative;

}

.eye{

position:absolute;

right:18px;

top:18px;

cursor:pointer;

font-size:20px;

}

.remember{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

font-size:14px;

}

.remember a{

color:#b7ff00;

text-decoration:none;

}

.login-btn{

width:100%;

height:60px;

background:#b7ff00;

border:none;

border-radius:15px;

font-size:19px;

font-weight:700;

cursor:pointer;

transition:.3s;

}

.login-btn:hover{

background:#d8ff52;

}

.bottom{

margin-top:25px;

text-align:center;

font-size:15px;

}

.bottom a{

color:#b7ff00;

text-decoration:none;

font-weight:600;

}

@media(max-width:500px){

.login-box{

width:94%;

padding:25px;

}

.logo h1{

font-size:26px;

}

.title{

font-size:24px;

}

}

</style>

</head>

<body>

<div class="bg1"></div>

<div class="bg2"></div>

<div class="login-box">

<div class="logo">

<div class="logo-circle">

🏪

</div>

<h1>

Nish<span>chay</span>

</h1>

</div>

<h2 class="title">

Merchant Login

</h2>

<p class="subtitle">

Login to manage your Nishchay Shop

</p>

<form id="loginForm">

<div class="input-group">

<label>

Email Address

</label>

<input
type="email"
id="email"
required
>

</div>

<div class="input-group">

<label>

Password

</label>

<div class="password-box">

<input
type="password"
id="password"
required
>

<span
class="eye"
onclick="togglePassword()"
>

👁

</span>

</div>

</div>

<div class="remember">

<label>

<input
type="checkbox"
>

 Remember Me

</label>

<a href="#">

Forgot Password?

</a>

</div>

<button
type="submit"
class="login-btn"
>

Login

</button>

<div class="bottom">

Don't have a shop?

<a href="/ecommerce/shop-register/">

Register Now

</a>

</div>

</form>

</div>

<script>

function togglePassword(){

const password =
document.getElementById(
"password"
);

if(password.type=="password"){

password.type="text";

}else{

password.type="password";

}

}


document.getElementById(
"loginForm"
).addEventListener(

"submit",

async function(e){

e.preventDefault();

const email =
document.getElementById(
"email"
).value;

const password =
document.getElementById(
"password"
).value;

try{

const response =
await fetch(

"/ecommerce/api/shop-login/",

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:JSON.stringify({

email:email,

password:password

})

}

);

const data =
await response.json();

console.log(data);

if(response.ok){

localStorage.setItem(

"access",

data.access

);

localStorage.setItem(

"refresh",

data.refresh

);

localStorage.setItem(

"shop_id",

data.shop_id

);

localStorage.setItem(

"shop_name",

data.shop_name

);

localStorage.setItem(

"subscription",

data.subscription

);

localStorage.setItem(

"kyc_status",

data.kyc_status

);

alert(

"Login Successful"

);

/*
===========================================
NEXT PAGE
===========================================

We will create this page next

/ecommerce/shop-dashboard/

*/

window.location.href =

"/ecommerce/shop-dashboard/";

}else{

alert(

data.message ||

"Invalid Login"

);

}

}

catch(error){

console.log(error);

alert(

"Server Error"

);

}

}

);

</script>

</body>

</html>
<script>

// ================================
// Auto Fill Email From Registration
// ================================

const registeredEmail =
localStorage.getItem("registered_shop_email");

if(registeredEmail){

document.getElementById(
"email"
).value = registeredEmail;

}

// ================================
// Enter Key Login
// ================================

document.addEventListener(

"keydown",

function(e){

if(e.key==="Enter"){

document.getElementById(
"loginForm"
).requestSubmit();

}

}

);

// ================================
// Button Loading Animation
// ================================

const loginForm =
document.getElementById(
"loginForm"
);

const loginButton =
document.querySelector(
".login-btn"
);

loginForm.addEventListener(

"submit",

function(){

loginButton.disabled = true;

loginButton.innerHTML =

"Please Wait...";

}

);

// ================================
// Network Status
// ================================

window.addEventListener(

"offline",

function(){

alert(

"No Internet Connection"

);

}

);

// ================================
// Welcome Animation
// ================================

window.onload = function(){

document.querySelector(

".login-box"

).animate(

[

{

opacity:0,

transform:"translateY(40px)"

},

{

opacity:1,

transform:"translateY(0)"

}

],

{

duration:700,

fill:"forwards"

}

);

};

</script>
